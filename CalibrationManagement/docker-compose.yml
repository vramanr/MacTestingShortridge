version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: calibration-postgres
    environment:
      POSTGRES_DB: CalibrationManagement
      POSTGRES_USER: calibration_user
      POSTGRES_PASSWORD: calibration_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - calibration-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: calibration-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=CalibrationManagement;Username=calibration_user;Password=calibration_password
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5000:80"
    depends_on:
      - postgres
    networks:
      - calibration-network

volumes:
  postgres_data:

networks:
  calibration-network:
    driver: bridge
