<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="'navigation'"
      [mode]="'over'"
      [opened]="false">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <mat-divider></mat-divider>
      <h3 matSubheader>Calibration</h3>
      <a mat-list-item routerLink="/calibration/entry" routerLinkActive="active">
        <mat-icon>add_circle</mat-icon>
        <span>New Calibration</span>
      </a>
      <a mat-list-item routerLink="/calibration/search" routerLinkActive="active">
        <mat-icon>search</mat-icon>
        <span>Search & Edit</span>
      </a>
      <a mat-list-item routerLink="/calibration/type-selection" routerLinkActive="active">
        <mat-icon>category</mat-icon>
        <span>No Order Entry</span>
      </a>
      <mat-divider></mat-divider>
      <h3 matSubheader>Management</h3>
      <a mat-list-item routerLink="/order/search" routerLinkActive="active">
        <mat-icon>receipt</mat-icon>
        <span>Orders</span>
      </a>
      <a mat-list-item routerLink="/company/management" routerLinkActive="active">
        <mat-icon>business</mat-icon>
        <span>Companies</span>
      </a>
      <a mat-list-item routerLink="/tolerance/management" routerLinkActive="active">
        <mat-icon>tune</mat-icon>
        <span>Tolerances</span>
      </a>
      <a mat-list-item routerLink="/technician/management" routerLinkActive="active">
        <mat-icon>person</mat-icon>
        <span>Technicians</span>
      </a>
      <mat-divider></mat-divider>
      <a mat-list-item routerLink="/reports" routerLinkActive="active">
        <mat-icon>assessment</mat-icon>
        <span>Reports</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>Calibration Management System</span>
      <span class="spacer"></span>
      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
